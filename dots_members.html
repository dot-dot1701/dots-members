<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dots Member Book</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a3f5c;
    --navy-light: #2a5278;
    --navy-pale: #e8f1f8;
    --accent: #3a8fc8;
    --accent-light: #cde4f4;
    --bg: #f4f7fa;
    --card-bg: #ffffff;
    --text-main: #1a2533;
    --text-sub: #5a6a7a;
    --text-hint: #8fa3b3;
    --border: #dde6ee;
    --radius: 16px;
    --radius-sm: 10px;
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 0 40px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(26,63,92,0.25);
  }
  .logo-img { height: 36px; object-fit: contain; }
  .header-subtitle {
    font-size: 12px; color: rgba(255,255,255,0.55);
    font-family: 'Outfit', sans-serif; letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 60%, #2e6da0 100%);
    padding: 48px 40px 40px; color: #fff;
    position: relative; overflow: hidden;
  }
  .hero::after { content: ''; position: absolute; right: -60px; top: -60px; width: 280px; height: 280px; border-radius: 50%; border: 40px solid rgba(255,255,255,0.05); pointer-events: none; }
  .hero::before { content: ''; position: absolute; right: 60px; bottom: -80px; width: 180px; height: 180px; border-radius: 50%; border: 30px solid rgba(255,255,255,0.04); pointer-events: none; }
  .hero h1 { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 6px; }
  .hero p { font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 24px; }
  .count-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 4px 14px; font-size: 13px; color: rgba(255,255,255,0.9); margin-bottom: 28px; }
  .search-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; position: relative; z-index: 2; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 400px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.5; pointer-events: none; }
  #search { width: 100%; height: 44px; padding: 0 16px 0 42px; border-radius: 22px; border: none; background: rgba(255,255,255,0.15); color: #fff; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: background 0.2s; }
  #search::placeholder { color: rgba(255,255,255,0.5); }
  #search:focus { background: rgba(255,255,255,0.22); }
  .filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { height: 36px; padding: 0 16px; border-radius: 18px; border: 1.5px solid rgba(255,255,255,0.3); background: transparent; color: rgba(255,255,255,0.75); font-size: 12px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .filter-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .filter-btn.active { background: #fff; color: var(--navy); border-color: #fff; }

  /* MAIN */
  main { max-width: 1080px; margin: 0 auto; padding: 36px 24px 60px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 20px; padding-left: 4px; }

  /* CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
  .member-card { background: var(--card-bg); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 28px 24px 22px; cursor: pointer; transition: transform 0.22s cubic-bezier(.23,1,.32,1), box-shadow 0.22s; position: relative; overflow: hidden; }
  .member-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--card-accent, var(--navy)); border-radius: var(--radius) var(--radius) 0 0; }
  .member-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(26,63,92,0.13); border-color: var(--accent-light); }
  .card-avatar { width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; color: #fff; background: var(--card-accent, var(--navy)); position: relative; }
  .card-name { text-align: center; font-size: 17px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
  .card-position { text-align: center; font-size: 12px; color: var(--text-sub); margin-bottom: 14px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 16px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; }
  .tag-dept { background: var(--navy-pale); color: var(--navy-light); }
  .tag-role { background: #fef3e2; color: #a06000; }
  .card-comment { font-size: 12px; color: var(--text-sub); text-align: center; line-height: 1.6; padding-top: 12px; border-top: 1px solid var(--border); font-style: italic; }
  .no-results { grid-column: 1/-1; text-align: center; padding: 60px 0; color: var(--text-hint); font-size: 15px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(10,20,35,0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(3px); }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card-bg); border-radius: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; position: relative; transform: scale(0.93) translateY(12px); transition: transform 0.28s cubic-bezier(.23,1,.32,1); box-shadow: 0 24px 64px rgba(10,20,35,0.25); }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-header { padding: 36px 32px 28px; border-radius: 24px 24px 0 0; position: relative; text-align: center; overflow: hidden; }
  .modal-header::after { content: ''; position: absolute; right: -30px; bottom: -50px; width: 140px; height: 140px; border-radius: 50%; border: 25px solid rgba(255,255,255,0.06); }
  .modal-avatar { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 700; background: #fff; position: relative; border: 4px solid rgba(255,255,255,0.3); }
  .modal-name { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; position: relative; }
  .modal-sub { font-size: 13px; color: rgba(255,255,255,0.65); position: relative; }
  .close-btn { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 2; }
  .close-btn:hover { background: rgba(255,255,255,0.25); }
  .close-btn svg { width: 14px; height: 14px; }
  .modal-body { padding: 28px 32px 32px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .info-block { background: var(--bg); border-radius: var(--radius-sm); padding: 14px 16px; }
  .info-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 4px; }
  .info-value { font-size: 14px; font-weight: 500; color: var(--text-main); line-height: 1.4; }
  .info-block.full { grid-column: 1 / -1; }
  .comment-box { background: var(--navy-pale); border-left: 4px solid var(--navy); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 16px 18px; margin-top: 4px; }
  .comment-box p { font-size: 14px; color: var(--navy-light); line-height: 1.7; font-style: italic; }
  .modal::-webkit-scrollbar { width: 5px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* EDIT SECTION */
  .edit-section {
    background: var(--navy);
    padding: 60px 40px;
    margin-top: 0;
  }
  .edit-inner {
    max-width: 780px;
    margin: 0 auto;
  }
  .edit-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; flex-wrap: wrap; gap: 12px;
  }
  .edit-title {
    font-family: 'Outfit', sans-serif;
    font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.02em;
  }
  .edit-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 28px; }
  .edit-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .form-group select,
  .form-group input,
  .form-group textarea {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
  }
  .form-group select option { background: var(--navy); color: #fff; }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .edit-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
  .btn-save {
    height: 44px; padding: 0 28px;
    background: #fff; color: var(--navy);
    border: none; border-radius: 22px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-save:hover { background: var(--accent-light); }
  .btn-csv {
    height: 44px; padding: 0 22px;
    background: transparent; color: rgba(255,255,255,0.75);
    border: 1.5px solid rgba(255,255,255,0.3); border-radius: 22px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-csv:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.5); }

  /* HISTORY TABLE */
  .history-wrap { margin-top: 36px; }
  .history-title { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .history-count { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: rgba(255,255,255,0.7); }
  .history-table-wrap { overflow-x: auto; border-radius: 12px; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .history-table th { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 14px; text-align: left; white-space: nowrap; }
  .history-table td { padding: 10px 14px; color: rgba(255,255,255,0.8); border-top: 1px solid rgba(255,255,255,0.07); white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
  .history-table tr:hover td { background: rgba(255,255,255,0.05); }
  .empty-history { text-align: center; padding: 30px; color: rgba(255,255,255,0.3); font-size: 13px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: #fff; color: var(--navy);
    border-radius: 12px; padding: 14px 20px;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    z-index: 2000;
    transform: translateY(20px); opacity: 0;
    transition: all 0.3s cubic-bezier(.23,1,.32,1);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <img class="logo-img" id="site-logo" src="" alt="Dots">
  <span class="header-subtitle">Member Book</span>
</header>

<div class="hero">
  <h1>Member Book</h1>
  <p>Dotsのメンバーを知ろう</p>
  <div class="count-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span id="count-label">全 8 名</span>
  </div>
  <div class="search-bar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="名前・職種・趣味で検索..." autocomplete="off">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">全員</button>
      <button class="filter-btn" data-filter="customer support">CS</button>
      <button class="filter-btn" data-filter="sales">Sales</button>
      <button class="filter-btn" data-filter="sales assistant">SA</button>
    </div>
  </div>
</div>

<main>
  <p class="section-label" id="result-label">メンバー一覧</p>
  <div class="cards-grid" id="cards-grid"></div>
</main>

<!-- EDIT SECTION -->
<div class="edit-section">
  <div class="edit-inner">
    <div class="edit-header">
      <div>
        <div class="edit-title">プロフィール編集</div>
        <div class="edit-subtitle">変更した内容はCSVでエクスポートできます</div>
      </div>
    </div>

    <div class="edit-form">
      <div class="form-group">
        <label>メンバー選択</label>
        <select id="edit-member"></select>
      </div>
      <div class="form-group">
        <label>入社年月</label>
        <input type="text" id="edit-joined" placeholder="例：2024年4月">
      </div>
      <div class="form-group">
        <label>職種</label>
        <input type="text" id="edit-dept" placeholder="例：sales">
      </div>
      <div class="form-group">
        <label>役職</label>
        <input type="text" id="edit-role" placeholder="例：staff">
      </div>
      <div class="form-group">
        <label>趣味</label>
        <input type="text" id="edit-hobby" placeholder="例：読書・旅行">
      </div>
      <div class="form-group">
        <label>好きな食べ物</label>
        <input type="text" id="edit-food" placeholder="例：ラーメン">
      </div>
      <div class="form-group full">
        <label>一言コメント</label>
        <textarea id="edit-comment" placeholder="一言コメントを入力..."></textarea>
      </div>
    </div>

    <div class="edit-actions">
      <button class="btn-save" id="btn-save">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        変更を保存
      </button>
      <button class="btn-csv" id="btn-csv">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        CSVエクスポート
      </button>
      <button class="btn-csv" id="btn-clear" style="color:rgba(255,100,100,0.7);border-color:rgba(255,100,100,0.3)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        履歴をクリア
      </button>
    </div>

    <div class="history-wrap">
      <div class="history-title">
        編集履歴
        <span class="history-count" id="hist-count">0件</span>
      </div>
      <div class="history-table-wrap" id="hist-wrap">
        <div class="empty-history">まだ編集履歴がありません</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header" id="modal-header">
      <button class="close-btn" id="close-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-avatar" id="modal-avatar"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-sub" id="modal-sub"></div>
    </div>
    <div class="modal-body">
      <div class="info-grid" id="info-grid"></div>
      <div class="comment-box"><p id="modal-comment"></p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── LOGO (base64 will be injected by script below) ──
document.getElementById("site-logo").src = window._logoSrc || "";

// ── MEMBER DATA ──
const members = [
  { name:"奥田 真弘", initials:"奥", photo:"images/okuda.png", dept:"", role:"代表取締役", joined:"2017年1月", hobby:"ゴルフ・読書", food:"寿司", comment:"人と企業の可能性を信じ、共に成長し続けることが私の使命です。", color:"#1a3f5c" },
  { name:"大野 颯太", initials:"大", photo:"images/ohno.png", dept:"sales", role:"MGR", joined:"2025年7月", hobby:"サッカー観戦・映画鑑賞", food:"焼肉", comment:"目標に向かってチーム一丸で走り続けます！数字で結果を出すのが好きです。", color:"#2a6496" },
  { name:"村山 勢奈", initials:"村", photo:"images/murayama.png", dept:"customer support", role:"LD", joined:"2024年12月", hobby:"ヨガ・カフェ巡り", food:"パスタ", comment:"お客様の「ありがとう」が一番の励みです。丁寧なコミュニケーションを大切にしています。", color:"#3a6f8c" },
  { name:"植島 沙樹", initials:"植", dept:"customer support", role:"staff", joined:"2021年12月", hobby:"登山・写真撮影", food:"ラーメン", comment:"一つひとつの対応を丁寧に。長く続けることで見えてくるものがあると思っています。", color:"#4a7c8e" },
  { name:"井出 蘭", initials:"井", photo:"images/ide.png", dept:"customer support", role:"staff", joined:"2024年12月", hobby:"読書・料理", food:"唐揚げ", comment:"まだまだ勉強中ですが、毎日少しずつ成長できるよう努力しています！", color:"#5a7a9a" },
  { name:"的場 梨佐", initials:"的", dept:"customer support", role:"staff", joined:"2025年11月", hobby:"ダンス・音楽鑑賞", food:"カレー", comment:"明るさと元気さが私の武器！職場の雰囲気を盛り上げていきたいと思っています。", color:"#6a88aa" },
  { name:"有澤 拓己", initials:"有", dept:"sales assistant", role:"staff", joined:"2026年3月", hobby:"筋トレ・ゲーム", food:"餃子", comment:"右も左もわからない新人ですが、全力でチームに貢献します！よろしくお願いします！", color:"#2a7a8c" },
  { name:"山本 瑛太", initials:"山", dept:"sales assistant", role:"staff", joined:"2026年4月", hobby:"バスケットボール・旅行", food:"ピザ", comment:"入ったばかりですが元気だけは誰にも負けません。いっしょに盛り上げていきましょう！", color:"#3a8c7c" }
];

let activeFilter = "all", searchQuery = "";

// ── HISTORY (localStorage) ──
const HIST_KEY = "dots_edit_history";
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || "[]"); } catch { return []; }
}
function saveHistory(h) { localStorage.setItem(HIST_KEY, JSON.stringify(h)); }

// ── CARDS ──
function renderCards() {
  const grid = document.getElementById("cards-grid");
  const label = document.getElementById("result-label");
  grid.innerHTML = "";
  const results = members.filter(m => {
    const q = searchQuery.toLowerCase();
    const ms = !q || [m.name,m.dept,m.role,m.hobby,m.food,m.comment].some(v => v.toLowerCase().includes(q));
    const mf = activeFilter === "all" || m.dept === activeFilter;
    return ms && mf;
  });
  label.textContent = results.length + " 名のメンバー";
  if (!results.length) { grid.innerHTML = '<div class="no-results">該当するメンバーが見つかりませんでした</div>'; return; }
  results.forEach(m => {
    const card = document.createElement("div");
    card.className = "member-card";
    card.style.setProperty("--card-accent", m.color);
    card.innerHTML = `
      <div class="card-avatar" style="background:${m.color}">
        ${m.photo ? `<img src="${m.photo}" alt="${m.name}" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.remove()">` : ""}
        <span>${m.initials}</span>
      </div>
      <div class="card-name">${m.name}</div>
      <div class="card-position">${m.joined} 入社</div>
      <div class="card-tags">
        ${m.dept ? `<span class="tag tag-dept">${m.dept}</span>` : ""}
        <span class="tag tag-role">${m.role}</span>
      </div>
      <div class="card-comment">「${m.comment.substring(0,28)}${m.comment.length>28?"…」":"」"}</div>`;
    card.addEventListener("click", () => openModal(m));
    grid.appendChild(card);
  });
}

// ── MODAL ──
function openModal(m) {
  document.getElementById("modal-avatar").innerHTML = (m.photo ? `<img src="${m.photo}" alt="${m.name}" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.remove()">` : "") + `<span style="color:${m.color}">${m.initials}</span>`;
  document.getElementById("modal-name").textContent = m.name;
  document.getElementById("modal-sub").textContent = (m.dept ? m.dept + " / " : "") + m.role;
  document.getElementById("modal-header").style.background = `linear-gradient(135deg,${m.color} 0%,${m.color}cc 100%)`;
  document.getElementById("info-grid").innerHTML = `
    <div class="info-block"><div class="info-label">役職</div><div class="info-value">${m.role}</div></div>
    <div class="info-block"><div class="info-label">入社年月</div><div class="info-value">${m.joined}</div></div>
    ${m.dept?`<div class="info-block full"><div class="info-label">職種</div><div class="info-value">${m.dept}</div></div>`:""}
    <div class="info-block"><div class="info-label">趣味</div><div class="info-value">${m.hobby}</div></div>
    <div class="info-block"><div class="info-label">好きな食べ物</div><div class="info-value">${m.food}</div></div>`;
  document.getElementById("modal-comment").textContent = "「" + m.comment + "」";
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); document.body.style.overflow = ""; }
document.getElementById("close-btn").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => { if(e.target===document.getElementById("modal-overlay")) closeModal(); });
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

// ── FILTERS & SEARCH ──
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});
document.getElementById("search").addEventListener("input", e => { searchQuery = e.target.value; renderCards(); });

// ── EDIT FORM ──
const sel = document.getElementById("edit-member");
members.forEach((m,i) => { const o = document.createElement("option"); o.value=i; o.textContent=m.name; sel.appendChild(o); });
function fillForm() {
  const m = members[+sel.value];
  document.getElementById("edit-dept").value = m.dept;
  document.getElementById("edit-role").value = m.role;
  document.getElementById("edit-joined").value = m.joined;
  document.getElementById("edit-hobby").value = m.hobby;
  document.getElementById("edit-food").value = m.food;
  document.getElementById("edit-comment").value = m.comment;
}
sel.addEventListener("change", fillForm);
fillForm();

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// ── HISTORY RENDER ──
function renderHistory() {
  const h = loadHistory();
  document.getElementById("hist-count").textContent = h.length + "件";
  const wrap = document.getElementById("hist-wrap");
  if (!h.length) { wrap.innerHTML = '<div class="empty-history">まだ編集履歴がありません</div>'; return; }
  const rows = h.slice().reverse().map(r => `
    <tr>
      <td>${r.ts}</td>
      <td>${r.name}</td>
      <td>${r.field}</td>
      <td title="${r.before}">${r.before}</td>
      <td title="${r.after}">${r.after}</td>
    </tr>`).join("");
  wrap.innerHTML = `<table class="history-table">
    <thead><tr><th>日時</th><th>メンバー</th><th>項目</th><th>変更前</th><th>変更後</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── GAS URL ──
const GAS_URL = "https://script.google.com/macros/s/AKfycbxBgFQ-ASE-VD820oaUeEfDsRdlrkToyZKt-zODuY5pADcDBZi8c5CY6iHXPI03zYlzLQ/exec";

// ── SAVE ──
document.getElementById("btn-save").addEventListener("click", async () => {
  const idx = +sel.value;
  const m = members[idx];
  const fields = [
    {key:"dept",  label:"職種",       id:"edit-dept"},
    {key:"role",  label:"役職",       id:"edit-role"},
    {key:"joined",label:"入社年月",   id:"edit-joined"},
    {key:"hobby", label:"趣味",       id:"edit-hobby"},
    {key:"food",  label:"好きな食べ物",id:"edit-food"},
    {key:"comment",label:"一言コメント",id:"edit-comment"},
  ];
  const h = loadHistory();
  const ts = new Date().toLocaleString("ja-JP");
  const newRows = [];
  fields.forEach(f => {
    const newVal = document.getElementById(f.id).value.trim();
    if (newVal !== m[f.key]) {
      const row = { ts, name:m.name, field:f.label, before:m[f.key], after:newVal };
      h.push(row);
      newRows.push(row);
      m[f.key] = newVal;
    }
  });
  if (!newRows.length) { showToast("変更はありませんでした"); return; }
  saveHistory(h);
  renderHistory();
  renderCards();
  showToast("⏳ スプレッドシートに送信中...");
  try {
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(newRows)
    });
    showToast("✓ " + m.name + " の変更をスプレッドシートに保存しました");
  } catch(err) {
    showToast("⚠ ローカル保存済み・スプレッドシート送信に失敗しました");
  }
});

// ── CSV EXPORT ──
document.getElementById("btn-csv").addEventListener("click", () => {
  const h = loadHistory();
  if (!h.length) { showToast("エクスポートする履歴がありません"); return; }
  const bom = "\uFEFF";
  const header = "日時,メンバー,項目,変更前,変更後\n";
  const rows = h.map(r => [r.ts,r.name,r.field,r.before,r.after].map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([bom+header+rows], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dots_edit_history_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click();
  showToast("CSVをダウンロードしました");
});

// ── CLEAR ──
document.getElementById("btn-clear").addEventListener("click", () => {
  if (!confirm("編集履歴をすべて削除しますか？")) return;
  localStorage.removeItem(HIST_KEY);
  renderHistory();
  showToast("履歴をクリアしました");
});

// ── INIT ──
renderCards();
renderHistory();
</script>
